    try{

      return JSON.parse(v) ?? fallback;
    } catch{ return fallback; }
  },
  set(key, value){
    try{ localStorage.setItem(key, JSON.stringify(value)); return true; }
    catch(e){ console.warn('LS.set error:',e); return false; }
  }
};

const PC={CoreTech:"#38bdf8",NonTech:"#c084fc",Quality:"#4ade80",Energy:"#fcd34d",Moon:"#f9a8d4",Hedge:"#94a3b8",Cash:"#6ee7b7"};

function PieChart({bp,total}){
  const buckets=Object.keys(BC);
  const vals=buckets.map(b=>Math.max(bp[b]||0,0));
  const sum=vals.reduce((a,v)=>a+v,0)||1;

  // Donut geometry
  const W=260,H=260,cx=130,cy=130,R=96,ri=58,GAP=0.028;
  let ang=3*Math.PI/4;  // 7:30 position (225° from top, clockwise)
  const slices=buckets.map((b,i)=>{
    const raw=vals[i]/sum;
    const sweep=Math.max(raw*2*Math.PI-GAP,0.001);
    const a1=ang+GAP/2,a2=a1+sweep;
    ang+=raw*2*Math.PI;
    const mid=(a1+a2)/2;
    // outer/inner arc points
    const ox1=cx+R*Math.cos(a1),oy1=cy+R*Math.sin(a1);
    const ox2=cx+R*Math.cos(a2),oy2=cy+R*Math.sin(a2);
    const ix1=cx+ri*Math.cos(a2),iy1=cy+ri*Math.sin(a2);
    const ix2=cx+ri*Math.cos(a1),iy2=cy+ri*Math.sin(a1);
    const lg=sweep>Math.PI?1:0;
    const d=`M${ox1},${oy1} A${R},${R} 0 ${lg},1 ${ox2},${oy2} L${ix1},${iy1} A${ri},${ri} 0 ${lg},0 ${ix2},${iy2} Z`;
    // leader line: from ring midpoint outward
    const r1=R+6, r2=R+16, r3=R+20;
    const lx1=cx+r1*Math.cos(mid),ly1=cy+r1*Math.sin(mid);
    const lx2=cx+r2*Math.cos(mid),ly2=cy+r2*Math.sin(mid);
    // text anchor side
    const right=Math.cos(mid)>0;
    const lx3=cx+r3*Math.cos(mid)+(right?4:-4),ly3=cy+r3*Math.sin(mid);
    return{b,raw,d,mid,lx1,ly1,lx2,ly2,lx3,ly3,right,pct:bp[b]||0};
  });

  return(
    <div style={{background:T.bg1,border:`1px solid ${T.b1}`,borderRadius:16,
      padding:"18px 18px 16px",marginTop:12}}>

      {/* header */}
      <div style={{fontSize:9,fontWeight:600,color:T.t3,letterSpacing:"2.5px",
        textTransform:"uppercase",marginBottom:4,paddingBottom:10,
        borderBottom:`1px solid ${T.b1}`,display:"flex",
        justifyContent:"space-between",alignItems:"center"}}>
        <span>Allocation</span>
        {total>0&&<span style={{fontFamily:"'DM Mono',monospace",color:T.t2,
          letterSpacing:"1px",fontSize:10}}>{(total/1000).toFixed(1)}K THB</span>}
      </div>

      {/* chart — wider viewBox to give room for labels */}
      <div style={{display:"flex",justifyContent:"center",margin:"4px 0 16px"}}>
        <svg width="100%" viewBox={`0 0 ${W} ${H}`}
          style={{maxWidth:320,overflow:"visible"}}>

          {/* subtle bg track */}
          <circle cx={cx} cy={cy} r={(R+ri)/2} fill="none"
            stroke={T.bg2} strokeWidth={R-ri+2}/>

          {/* slices */}
          {slices.map(s=>(
            <path key={s.b} d={s.d} fill={PC[s.b]} opacity={0.93}/>
          ))}

          {/* leader lines + labels — only for slices > 5% */}
          {slices.filter(s=>s.raw>0.05).map(s=>(
            <g key={s.b+"_lbl"}>
              <line x1={s.lx1} y1={s.ly1} x2={s.lx2} y2={s.ly2}
                stroke={PC[s.b]} strokeWidth="1.2" opacity="0.7"/>
              <circle cx={s.lx2} cy={s.ly2} r="1.8" fill={PC[s.b]}/>
              <text x={s.lx3} y={s.ly3}
                textAnchor={s.right?"start":"end"}
                dominantBaseline="middle"
                fontSize="9.5" fontWeight="600"
                fill={PC[s.b]} fontFamily="DM Mono,monospace">
                {s.pct.toFixed(0)}%
              </text>
            </g>
          ))}

          {/* center hole */}
          <circle cx={cx} cy={cy} r={ri-1} fill={T.bg1}/>

          {/* center text */}
          <text x={cx} y={cy-11} textAnchor="middle" fontSize="18"
            fill={T.t1} fontFamily="DM Mono,monospace" fontWeight="500">
            {(total/1000).toFixed(0)}K
          </text>
          <text x={cx} y={cy+8} textAnchor="middle" fontSize="9"
            fill={T.t3} fontFamily="Inter,sans-serif" letterSpacing="0.5">
            THB
          </text>
          <text x={cx} y={cy+22} textAnchor="middle" fontSize="7.5"
            fill={T.t3} fontFamily="Inter,sans-serif" opacity="0.7">
            135% basis
          </text>
        </svg>
      </div>

      {/* legend grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px 10px"}}>
        {slices.map(s=>(
          <div key={s.b} style={{display:"flex",alignItems:"center",gap:8,
            padding:"7px 10px",borderRadius:8,background:T.bg2,
            border:`1px solid ${T.b1}`}}>
            <div style={{width:10,height:10,borderRadius:3,background:PC[s.b],
              flexShrink:0,boxShadow:`0 0 7px ${PC[s.b]}55`}}/>
            <span style={{fontSize:10,color:T.t1,fontWeight:500,flex:1,
              whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
              {BE[s.b]} {s.b}
            </span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,
              fontWeight:600,color:PC[s.b],flexShrink:0}}>
              {s.pct.toFixed(1)}%
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

  const [tab,setTab]=useState("dash");

  const [lastRefresh,setLastRefresh]=useState("");
  const [editTicker,setEditTicker]=useState(null);

  // ── Load from localStorage on mount ──────────────────────────────────────────
  useEffect(()=>{
    const sh=LS.get(SK,null), pr=LS.get(PK,null), mc=LS.get(MK,null);

    if(sh) setShares(s=>({...s,...sh}));
    if(pr) setPrices(p=>({...p,...pr}));
    if(mc) setMac(m=>({...m,...mc}));
    if(fxD) setFx(f=>({...f,...fxD}));
    if(svD) setSav(v=>({...v,...svD}));
    if(lr)  setLastRefresh(lr);
    const nSh=Object.values(sh||{}).filter(v=>parseFloat(v)>0).length;
    const nPr=Object.values(pr||{}).filter(v=>parseFloat(v)>0).length;
    console.log('[01T] Loaded — shares:',nSh,'prices:',nPr);
    setTimeout(()=>{ readyToSave.current=true; },300);
  },[]);

  // ── Auto-save on change (only after initial load) ─────────────────────────────
  useEffect(()=>{ if(readyToSave.current){ LS.set(MK,mac); } },[mac]);
  useEffect(()=>{ if(readyToSave.current){ LS.set(SVK,sav); } },[sav]);
  useEffect(()=>{ if(readyToSave.current){ LS.set(FK,fx); } },[fx]);
  useEffect(()=>{ if(readyToSave.current){ LS.set(PK,prices); setSaved(false); } },[prices]);
  useEffect(()=>{ if(readyToSave.current&&lastRefresh){ LS.set(LK,lastRefresh); } },[lastRefresh]);
  useEffect(()=>{
    if(!readyToSave.current) return;
    setSaved(false);
    const t=setTimeout(()=>{ LS.set(SK,shares); setSaved(true); setTimeout(()=>setSaved(false),2000); },600);
    return()=>clearTimeout(t);
  },[shares]);

  const saveNow=useCallback(()=>{
    readyToSave.current=true;
    LS.set(SK,shares); LS.set(PK,prices); LS.set(MK,mac);
    LS.set(SVK,sav); LS.set(FK,fx);
    if(lastRefresh) LS.set(LK,lastRefresh);
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
    console.log('[01T] Manual save ok');
  },[shares,prices,mac,sav,fx,lastRefresh]);

  function calcActions(budget){
    if(!budget||total===0)return[];
    const pri=AP[mode]||AP.NEUTRAL;
    const out=[]; let rem=budget;
    for(const bucket of pri){
      if(rem<=0)break;
      const gap=tgtM[bucket]-(bp[bucket]||0);
      if(gap<=1)continue;
      const need=(gap/135)*total;
      const stocks=ALL.filter(t=>BM[t]===bucket).map(t=>({
        t,gap:(BH[bucket]?.[mode]?.[t]??0)-(sp[t]||0),tgt2:BH[bucket]?.[mode]?.[t]??0
      })).filter(s=>s.gap>0.5).sort((a,b)=>b.gap-a.gap);
      for(const s of stocks){
        if(rem<=0)break;
        const amt=Math.min((s.gap/135)*total,rem,need);
        if(amt>200){out.push({ticker:s.t,bucket,amount:Math.round(amt/100)*100,gap:s.gap,tgt2:s.tgt2});rem-=amt;}
      }
    }
    return out;
  }
  function calcRebal(){
    if(total===0)return[];
    return ALL.map(t=>{
      const b=BM[t],tp=BH[b]?.[mode]?.[t]??0,cp=sp[t]||0,gap=tp-cp;
      return{ticker:t,bucket:b,cp,tp,gap,gapT:(gap/135)*total};
    }).filter(r=>Math.abs(r.gapT)>100).sort((a,b)=>b.gap-a.gap);
  }

  const actions=calcActions(bgt), rebal=calcRebal();

  // Paste parser
  function parsePaste(raw){
    const np={...prices}; let found=0;
    // Strip markdown artifacts: backticks, code fences, leading/trailing whitespace
    let cleaned=raw.replace(/```[a-z]*/gi,"").replace(/```/g,"").replace(/`/g,"").trim();
    function applyKey(k,val){
      let key=k.toUpperCase().trim();
      if(key==="BRKB"){key="BRK-B";}
      if(np[key]!==undefined&&val>0){np[key]=String(val);found++;return true;}
      return false;
    }
    // Try JSON parse first
    try{
      const j=JSON.parse(cleaned);
      Object.keys(j).forEach(k=>applyKey(k,parseFloat(j[k])));
      if(found>0) return{np,found};
    } catch{}
    // Fallback: "TICKER": 123.45 or TICKER 123.45 patterns (include BRK-B with dash)
    const matches=[...cleaned.matchAll(/"?([A-Z][A-Z0-9\-+]{1,9})"?\s*[:\s,]+\s*\$?([0-9]+\.?[0-9]*)/g)];
    matches.forEach(m=>applyKey(m[1],parseFloat(m[2])));
    return{np,found};
  }

                </button>

                  style={{background:T.bg2,border:`1px solid ${T.b1}`,color:T.t3,
                    borderRadius:8,padding:"9px 16px",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif"}}>
                  Clear
                </button>
              </div>
            </div>
            {Object.keys(BC).map(bucket=>{
              const tickers=ALL.filter(t=>BM[t]===bucket);
              return(
                <div key={bucket} style={{marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:600,color:BC[bucket],marginBottom:5,
                    display:"flex",alignItems:"center",gap:6}}>{BE[bucket]} {bucket}</div>
                  <div style={{background:T.bg1,border:`1px solid ${T.b1}`,borderRadius:12,overflow:"hidden"}}>
                    {tickers.map((ticker,i)=>{
                      const pr=parseFloat(prices[ticker]);
                      return(
                        <div key={ticker} style={{display:"flex",justifyContent:"space-between",
                          alignItems:"center",padding:"8px 16px",
                          borderBottom:i<tickers.length-1?`1px solid ${T.b1}`:"none"}}>
                          <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,
                            fontWeight:500,color:pr>0?T.t1:T.t3,minWidth:80}}>{ticker}</span>
                          <div style={{display:"flex",alignItems:"center",gap:4}}>
                            <span style={{fontSize:11,color:T.t3}}>$</span>
                            <input type="text" inputMode="decimal"
                              value={prices[ticker]||""}
                              onChange={e=>{
                                const v=e.target.value;
                                if(v===""||/^\d*\.?\d*$/.test(v)) setPrices(p=>({...p,[ticker]:v}));
                              }}
                              style={{...IS,fontSize:13,fontWeight:500,color:pr>0?T.a:T.t3,
                                textAlign:"right",width:90}}/>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ══════════════ ACTION ══════════════ */}
        {tab==="act"&&(
          <div>
            {/* Budget input */}
            <Card style={{marginBottom:14}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:16,alignItems:"center"}}>
                <div>
                  <div style={{fontSize:10,color:T.t3,letterSpacing:"1px",fontWeight:500,marginBottom:8}}>งบลงทุนเดือนนี้ (THB)</div>
                  <input type="number" value={fx.budget} onChange={e=>setFx(f=>({...f,budget:e.target.value}))}
                    placeholder="20000" style={{...IS,fontSize:28,fontWeight:700,color:T.a,fontFamily:"'Space Grotesk',sans-serif"}}/>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:10,color:T.t3,marginBottom:4}}>Mode</div>
                  <div style={{fontSize:14,fontWeight:600,color:mm.color}}>{mm.label}</div>
                  {total>0&&<div style={{fontSize:10,color:T.t3,marginTop:4,fontFamily:"'DM Mono',monospace"}}>{(total/1000).toFixed(1)}K THB</div>}
                </div>
              </div>
            </Card>

            {/* Action list */}
            {total===0&&<div style={{textAlign:"center",padding:"40px",color:T.t3}}>← กรอกพอร์ตใน Portfolio ก่อน</div>}
            {total>0&&!bgt&&<div style={{textAlign:"center",padding:"40px",color:T.t3}}>← กรอกงบลงทุนด้านบน</div>}
            {total>0&&bgt>0&&actions.length===0&&(
              <Card><div style={{color:"#10d9a0",textAlign:"center",padding:"12px",fontWeight:500}}>✅ พอร์ตสมดุลดีแล้ว ไม่มี action เร่งด่วน</div></Card>
            )}
            {actions.length>0&&(
              <div>
                <div style={{fontSize:10,color:T.t3,marginBottom:10}}>ลำดับซื้อจาก {bgt.toLocaleString()} THB · priority {mode} mode</div>
                {actions.map((a,i)=>{
                  const bc=BC[a.bucket];
                  return(
                    <div key={a.ticker} className="row-hover" style={{
                      display:"flex",alignItems:"center",gap:12,background:T.bg1,
                      border:`1px solid ${bc}22`,borderRadius:12,padding:"12px 16px",marginBottom:6,transition:"all .15s",
                    }}>
                      <div style={{width:26,height:26,borderRadius:"50%",background:`${bc}18`,border:`1px solid ${bc}33`,
                        display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:bc,flexShrink:0}}>
                        {i+1}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                          <span style={{fontSize:13,fontWeight:600,fontFamily:"'DM Mono',monospace"}}>{a.ticker}</span>
                          <span style={{fontSize:12}}>{BE[a.bucket]}</span>
                          <span style={{fontSize:10,color:T.t3}}>under {a.gap.toFixed(1)}%</span>
                        </div>
                        <div style={{fontSize:10,color:T.t3}}>target {a.tgt2}% · current {(sp[a.ticker]||0).toFixed(1)}%</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:16,fontWeight:700,color:T.a,fontFamily:"'Space Grotesk',sans-serif"}}>{a.amount.toLocaleString()}</div>
                        <div style={{fontSize:9,color:T.t3}}>THB</div>
                      </div>
                    </div>
                  );
                })}
                <div style={{background:T.bg2,borderRadius:10,padding:"10px 16px",marginTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:11,color:T.t3}}>รวมแนะนำ</span>
                  <span style={{fontSize:14,fontWeight:700,color:T.a,fontFamily:"'DM Mono',monospace"}}>{actions.reduce((s,a)=>s+a.amount,0).toLocaleString()} THB</span>
                </div>
              </div>
            )}

            {/* Rebalance */}
            <div style={{marginTop:20}}>
              <SLabel>Rebalance Calculator</SLabel>
              {total===0&&<div style={{textAlign:"center",padding:"20px",color:T.t3}}>กรอกพอร์ตก่อน</div>}
              {total>0&&rebal.length===0&&(
                <Card><div style={{color:"#10d9a0",textAlign:"center",padding:"10px",fontWeight:500}}>✅ ทุก position ใกล้เคียง target แล้ว</div></Card>
              )}
              {rebal.length>0&&(
                <div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
                    {[
                      ["ต้องซื้อเพิ่ม", rebal.filter(r=>r.gap>0).length+" ตัว", "#10d9a0"],
                      ["พิจารณา Trim", rebal.filter(r=>r.gap<0).length+" ตัว", "#f97316"],
                      ["งบที่ต้องการ", `${Math.round(rebal.filter(r=>r.gap>0).reduce((s,r)=>s+r.gapT,0)/100)*100|0} THB`, T.a],
                    ].map(([l,v,c])=>(
                      <div key={l} style={{background:T.bg2,borderRadius:10,padding:"12px",textAlign:"center"}}>
                        <div style={{fontSize:9,color:T.t3,marginBottom:5}}>{l}</div>
                        <div style={{fontSize:14,fontWeight:700,color:c,fontFamily:"'DM Mono',monospace"}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"separate",borderSpacing:"0 4px",fontSize:11}}>
                      <thead>
                        <tr>{["Ticker","Bucket","Current","Target","Gap","THB"].map(h=>(
                          <th key={h} style={{textAlign:h==="THB"?"right":"left",color:T.t3,padding:"4px 8px",fontWeight:500,fontSize:9,letterSpacing:"1px"}}>{h}</th>
                        ))}</tr>
                      </thead>
                      <tbody>
                        {rebal.map(r=>{
                          const buy=r.gap>0, bc=BC[r.bucket];
                          return(
                            <tr key={r.ticker} className="row-hover">
                              <td style={{padding:"8px 8px",fontWeight:600,fontFamily:"'DM Mono',monospace",background:T.bg1,borderRadius:"8px 0 0 8px"}}>{r.ticker}</td>
                              <td style={{padding:"8px 8px",background:T.bg1}}><span style={{fontSize:10,color:bc}}>{BE[r.bucket]}</span></td>
                              <td style={{padding:"8px 8px",fontFamily:"'DM Mono',monospace",background:T.bg1,color:T.t2}}>{r.cp.toFixed(1)}%</td>
                              <td style={{padding:"8px 8px",fontFamily:"'DM Mono',monospace",background:T.bg1,color:T.t2}}>{r.tp}%</td>
                              <td style={{padding:"8px 8px",fontFamily:"'DM Mono',monospace",background:T.bg1,color:buy?"#60a5fa":"#f97316",fontWeight:600}}>{buy?"+":""}{r.gap.toFixed(1)}%</td>
                              <td style={{padding:"8px 8px",fontFamily:"'DM Mono',monospace",background:T.bg1,borderRadius:"0 8px 8px 0",textAlign:"right",color:buy?"#10d9a0":"#f97316",fontWeight:600}}>{buy?"+":""}{Math.round(r.gapT).toLocaleString()}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ══════════════ NET WORTH ══════════════ */}
        {tab==="nw"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              <div>
                <div style={{fontSize:10,color:T.t3,letterSpacing:"1px",fontWeight:500,marginBottom:6}}>USD/THB</div>
                <input type="number" value={fx.usdthb} onChange={e=>setFx(f=>({...f,usdthb:e.target.value}))}
                  style={{...IS,fontSize:24,fontWeight:700,color:T.a,fontFamily:"'DM Mono',monospace"}}/>
              </div>
            </div>

            {/* Net Worth Cards */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
              {[
                ["01T Portfolio", `${(total/1000).toFixed(1)}K`, T.a],
                ["Gold Saving", `${(((parseFloat(sav.iau)||0)+(parseFloat(sav.kgc)||0))/1000).toFixed(1)}K`, "#fbbf24"],
                ["USD Deposit", `${((parseFloat(sav.usdDep)||0)*usdthb/1000).toFixed(1)}K`, "#a78bfa"],
              ].map(([l,v,c])=>(
                <div key={l} style={{background:T.bg1,border:`1px solid ${T.b1}`,borderRadius:12,padding:"14px 16px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:T.t3,marginBottom:6}}>{l}</div>
                  <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:20,fontWeight:700,color:c}}>{v}K</div>
                  <div style={{fontSize:9,color:T.t3,marginTop:2}}>THB</div>
                </div>
              ))}
            </div>

            <Card style={{marginBottom:12,border:`1px solid ${T.a}22`}}>
              <div style={{fontSize:10,color:T.t3,marginBottom:6}}>Total Net Worth</div>
              <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:32,fontWeight:800,color:T.a}}>{(nw/1000).toFixed(1)}K THB</div>
              <div style={{fontSize:11,color:T.t3,marginTop:4}}>${(nw/usdthb).toFixed(0)} USD</div>
            </Card>

            <Card>
              <SLabel>Gold Saving</SLabel>
              {[
                {label:"IAU (THB)",k:"iau",ph:"0"},
                {label:"KGC (THB)",k:"kgc",ph:"0"},
                {label:"USD Deposit",k:"usdDep",ph:"0"},
              ].map(f=>(
                <div key={f.k} style={{marginBottom:12}}>
                  <div style={{fontSize:10,color:T.t3,marginBottom:5}}>{f.label}</div>
                  <input type="number" value={sav[f.k]} onChange={e=>setSav(s=>({...s,[f.k]:e.target.value}))}
                    placeholder={f.ph} style={{...IS,fontSize:18,fontWeight:600,color:T.t1,fontFamily:"'DM Mono',monospace",
                      borderBottom:`1px solid ${T.b2}`,paddingBottom:6}}/>
                </div>
              ))}
            </Card>
          </div>
        )}

        {/* ══════════════ TARGET ══════════════ */}
        {tab==="tgt"&&(
          <div>
            {/* Mode comparison table */}
            <Card style={{marginBottom:12}}>
              <SLabel>Bucket Targets by Mode (135% Total)</SLabel>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr>
                      <th style={{textAlign:"left",padding:"6px 10px",color:T.t3,fontWeight:500,fontSize:9}}>Bucket</th>
                      {["🟢 BULL","🟡 NEUTRAL","🟠 CAUTION","🔴 CRISIS"].map(m=>(
                        <th key={m} style={{padding:"6px 10px",color:T.t3,fontWeight:500,fontSize:9,textAlign:"center"}}>{m}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {Object.keys(BC).map(b=>(
                      <tr key={b} className="row-hover">
                        <td style={{padding:"9px 10px",fontWeight:600,color:BC[b]}}>{BE[b]} {b}</td>
                        {["BULL","NEUTRAL","CAUTION","CRISIS"].map(m=>(
                          <td key={m} style={{padding:"9px 10px",textAlign:"center",
                            fontFamily:"'DM Mono',monospace",
                            color:m===mode?MM[m].color:T.t2,
                            fontWeight:m===mode?700:400,
                            background:m===mode?`${MM[m].color}08`:"transparent",
                          }}>{TARGET[m][b]}%</td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>

            {/* Stock targets */}
            {mode!=="UNKNOWN"&&(
              <div>
                <SLabel>Stock Targets · {mode} Mode</SLabel>
                {Object.keys(BC).map(bucket=>(
                  <div key={bucket} style={{marginBottom:14}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <span style={{fontSize:14}}>{BE[bucket]}</span>
                      <span style={{fontSize:13,fontWeight:600,color:BC[bucket]}}>{bucket}</span>
                      <span style={{fontSize:11,color:BC[bucket],fontFamily:"'DM Mono',monospace"}}>{tgtM[bucket]}%</span>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {Object.entries(BH[bucket]?.[mode]||{}).map(([t,p])=>(
                        <div key={t} style={{background:T.bg2,border:`1px solid ${BC[bucket]}22`,borderRadius:8,padding:"5px 12px",fontSize:11}}>
                          <span style={{fontWeight:600,fontFamily:"'DM Mono',monospace"}}>{t}</span>
                          <span style={{color:BC[bucket],marginLeft:8,fontFamily:"'DM Mono',monospace"}}>{p}%</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Permanent */}
            <Card style={{border:`1px solid rgba(251,191,36,.2)`}}>
              <SLabel>Permanent Holdings</SLabel>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {Object.entries(PERM).map(([t,mn])=>(
                  <div key={t} style={{background:T.bg2,border:`1px solid rgba(251,191,36,.2)`,borderRadius:8,padding:"5px 12px",fontSize:11}}>
                    <span style={{fontWeight:600,color:"#fbbf24",fontFamily:"'DM Mono',monospace"}}>{t}</span>
                    <span style={{color:T.t3,marginLeft:8}}>≥{mn}%</span>
                  </div>
                ))}
                <div style={{background:T.bg2,border:"1px solid rgba(248,113,113,.2)",borderRadius:8,padding:"5px 12px",fontSize:11}}>
                  <span style={{fontWeight:600,color:"#f87171",fontFamily:"'DM Mono',monospace"}}>CLOI</span>
                  <span style={{color:T.t3,marginLeft:8}}>= 3% fixed</span>
                </div>
              </div>
            </Card>
          </div>
        )}

        {/* ══════════════ MACRO ══════════════ */}
        {tab==="macro"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              {[
                {label:"VIX",k:"vix",ph:"26.78",fn:sVIX,note:"Fear gauge — equity options volatility",
                  zones:[{l:"<20",m:"BULL"},{l:"20–25",m:"NEUTRAL"},{l:"25–35",m:"CAUTION"},{l:">35",m:"CRISIS"}]},
                {label:"WTI Oil ($)",k:"oil",ph:"98.32",fn:sOil,note:"Stagflation + war inflation indicator",
                  zones:[{l:"<$85",m:"BULL"},{l:"$85–95",m:"NEUTRAL"},{l:"$95–115",m:"CAUTION"},{l:">$115",m:"CRISIS"}]},
                {label:"MOVE Index",k:"move",ph:"85",fn:sMOVE,note:"Bond market vol — credit stress",
                  zones:[{l:"<95",m:"BULL"},{l:"95–110",m:"NEUTRAL"},{l:"110–130",m:"CAUTION"},{l:">130",m:"CRISIS"}]},
                {label:"SPX vs 200MA %",k:"spx200",ph:"-4.4",fn:sSPX,note:"% ที่ SPX เหนือ/ต่ำกว่า 200-day MA",
                  zones:[{l:">+2%",m:"BULL"},{l:"-3 to +2%",m:"NEUTRAL"},{l:"-10 to -3%",m:"CAUTION"},{l:"<-10%",m:"CRISIS"}]},
              ].map(f=>{
                const raw=mac[f.k]??"";
                const n=parseFloat(raw);
                const sig=(!isNaN(n)&&raw.trim()!=="-"&&raw.trim()!=="")
                  ?f.fn(n):null;
                const c=sig?MM[sig].color:T.b2;
                return(
                  <Card key={f.k} style={{border:`1px solid ${sig?c+"33":T.b1}`}}>
                    <div style={{fontSize:9,color:T.t3,letterSpacing:"1px",fontWeight:500,marginBottom:8}}>{f.label}</div>
                    <input
                      type="text" inputMode="text" value={raw}
                      onChange={e=>{
                        const v=e.target.value;
                        if(v===""||v==="-"||/^-?\d*\.?\d*$/.test(v)){
                          setMac(m=>({...m,[f.k]:v}));
                        }
                      }}
                      placeholder={f.ph}
                      style={{...IS,fontSize:26,fontWeight:700,color:sig?c:T.t3,fontFamily:"'DM Mono',monospace"}}/>
                    {sig&&<div style={{display:"flex",alignItems:"center",gap:6,marginTop:8}}><ModeDot mode={sig}/><span style={{fontSize:11,fontWeight:600,color:c}}>{sig}</span></div>}
                    <div style={{fontSize:10,color:T.t3,marginTop:8,marginBottom:10}}>{f.note}</div>
                    {f.zones.map((z,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
                        <ModeDot mode={z.m}/>
                        <span style={{fontSize:10,color:sig===z.m?T.t1:T.t3,fontWeight:sig===z.m?600:400}}>{z.l}</span>
                        {sig===z.m&&<span style={{fontSize:9,color:MM[z.m].color,marginLeft:"auto"}}>← ตอนนี้</span>}
                      </div>
                    ))}
                  </Card>
                );
              })}
            </div>

            {/* Mode result */}
            <Card style={{background:mm.bg,border:`1px solid ${mm.border}`,marginBottom:10}}>
              <div style={{fontSize:9,color:T.t3,letterSpacing:"2px",fontWeight:500,marginBottom:6}}>FINAL MODE · WORST CASE</div>
              <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:700,color:mm.color}}>{mm.label}</div>
              <div style={{fontSize:11,color:T.t3,marginTop:4}}>{mm.desc}</div>
              {Object.keys(sigs).length>0&&(
                <div style={{display:"flex",gap:14,marginTop:12}}>
                  {Object.entries(sigs).map(([k,s])=>(
                    <div key={k} style={{textAlign:"center"}}>
                      <div style={{fontSize:8,color:T.t3,marginBottom:4,fontFamily:"'DM Mono',monospace"}}>{k}</div>
                      <Badge color={MM[s].color} bg={`${MM[s].color}18`}>{s}</Badge>
                    </div>
                  ))}
                </div>
              )}
            </Card>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Card>
                <SLabel>Transition Rules</SLabel>
                <div style={{fontSize:11,color:T.t2,lineHeight:2.2}}>
                  <div style={{fontSize:9,color:T.t3,fontWeight:600,letterSpacing:"1px",marginBottom:4}}>ขาลง (2 วันยืนยัน)</div>
                  <div>🟢 → 🟡 VIX &gt; 20</div>
                  <div>🟡 → 🟠 VIX &gt; 25</div>
                  <div style={{color:"#f87171"}}>🟠 → 🔴 VIX &gt; 35 — <strong>ทันที</strong></div>
                  <div style={{fontSize:9,color:T.t3,fontWeight:600,letterSpacing:"1px",marginTop:8,marginBottom:4}}>ขาขึ้น (3-5 วันยืนยัน)</div>
                  <div>🔴 → 🟠 VIX &lt; 30</div>
                  <div>🟠 → 🟡 VIX &lt; 22</div>
                  <div>🟡 → 🟢 VIX &lt; 18</div>
                </div>
              </Card>
              <Card style={{border:`1px solid rgba(248,113,113,.2)`}}>
                <SLabel>Crisis Deploy Protocol</SLabel>
                {[
                  {v:"VIX 35", d:"40% SGOV", t:"LLY · NVDA · GOOGL · CRWD · GLDM"},
                  {v:"VIX 45", d:"35% ที่เหลือ", t:"NVDA · AVGO · LLY · CEG · CRDO"},
                  {v:"VIX 60", d:"25% ที่เหลือ", t:"NVDA · GOOGL · LLY · AVGO"},
                ].map((r,i)=>(
                  <div key={i} style={{marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                      <span style={{color:"#f87171",fontWeight:700,fontSize:12,fontFamily:"'DM Mono',monospace"}}>{r.v}</span>
                      <span style={{color:T.t3,fontSize:10}}>→ {r.d}</span>
                    </div>
                    <div style={{fontSize:10,color:T.t3,paddingLeft:4}}>{r.t}</div>
                  </div>
                ))}
                <div style={{fontSize:10,color:"#f87171",paddingTop:8,borderTop:`1px solid ${T.b1}`}}>⚠ CLOI = Iron Floor — ห้าม deploy ทุกกรณี</div>
              </Card>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
